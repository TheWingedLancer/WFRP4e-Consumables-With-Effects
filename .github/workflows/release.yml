# ============================================================================
# GitHub Actions — Automatic Release Packaging
# ============================================================================
#
# This workflow fires when you push a version tag (e.g. v1.0.0).
# It:
#   1. Checks out the repo
#   2. Rewrites the "download" URL in module.json to point at this release's zip
#   3. Packages everything into a zip named wfrp4e-consumables-with-effects-v1.0.0.zip
#   4. Creates a GitHub Release with the zip AND the updated module.json attached
#
# The module.json attached to the release is the one Foundry fetches when a user
# installs via the manifest URL:
#   https://github.com/TheWingedLancer/wfrp4e-consumables-with-effects/releases/latest/download/module.json
#
# That module.json's "download" field points at the zip in the same release,
# so Foundry can download and install the module automatically.
#
# USAGE:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# ============================================================================

name: Release Module

on:
  push:
    tags:
      - "v*"  # Trigger on any tag starting with "v" (v1.0.0, v1.2.3, etc.)

permissions:
  contents: write  # Needed to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # --- Step 1: Check out the repository ---
      - name: Checkout
        uses: actions/checkout@v4

      # --- Step 2: Extract the version from the git tag ---
      # Strips the leading "v" from the tag name (v1.0.0 → 1.0.0)
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # --- Step 3: Update module.json with the correct download URL ---
      # The download URL must point at the zip asset in THIS specific release.
      # We also update the version field to match the tag.
      - name: Update module.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"

          # Use jq to rewrite version and download URL in-place
          jq \
            --arg ver "$VERSION" \
            --arg dl "https://github.com/${REPO}/releases/download/${TAG}/wfrp4e-consumables-with-effects-${TAG}.zip" \
            --arg mf "https://github.com/${REPO}/releases/latest/download/module.json" \
            '.version = $ver | .download = $dl | .manifest = $mf' \
            module.json > module.json.tmp && mv module.json.tmp module.json

      # --- Step 4: Package the module into a zip ---
      # The zip must contain a top-level folder named "wfrp4e-consumables-with-effects"
      # matching the module id, because Foundry expects that structure.
      - name: Create release zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create a staging directory with the correct folder name
          mkdir -p staging/wfrp4e-consumables-with-effects
          # Copy all module files (excluding git/github metadata)
          cp -r module.json scripts/ styles/ templates/ lang/ LICENSE README.md staging/wfrp4e-consumables-with-effects/
          # Build the zip from the staging directory
          cd staging
          zip -r "../wfrp4e-consumables-with-effects-${TAG}.zip" wfrp4e-consumables-with-effects/

      # --- Step 5: Create the GitHub Release with assets ---
      # Uploads both:
      #   • module.json — the manifest Foundry reads to discover the download URL
      #   • the .zip    — the actual module package Foundry downloads and extracts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WFRP4e Consumable Effects ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            wfrp4e-consumables-with-effects-${{ github.ref_name }}.zip
            module.json
